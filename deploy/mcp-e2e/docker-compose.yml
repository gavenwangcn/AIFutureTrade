# MCP 端到端（仅协议访问 trade-mcp）
#
# 宿主机须已启动 trade-mcp（默认 8099）。在 Linux 上若容器访问不到 host 的 8099，可改用：
#   export TRADE_MCP_BASE_URL=http://172.17.0.1:8099
# 或使用 network_mode: host（仅 Linux）
#
#   docker compose --profile mcp-e2e build
#   docker compose --profile mcp-e2e run --rm -e TRADE_MCP_BASE_URL=http://host.docker.internal:8099 mcp-e2e

services:
  mcp-e2e:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - mcp-e2e
    environment:
      TRADE_MCP_BASE_URL: ${TRADE_MCP_BASE_URL:-http://host.docker.internal:8099}
      MCP_SSE_PATH: ${MCP_SSE_PATH:-/sse}
      E2E_MCP_TIMEOUT: ${E2E_MCP_TIMEOUT:-120}
      E2E_SKIP_MARKET: ${E2E_SKIP_MARKET:-0}
