server:
  port: 8099

# MCP HTTP 请求日志（方法、URI、客户端 IP、状态码、耗时）；见 McpHttpRequestLoggingFilter
# MCP 工具名日志：在 @McpTool 方法执行前打印 tool=trade.market.klines 等，见 McpToolExecutionLoggingAspect（不依赖解析 /mcp/message 请求体）
trade-mcp:
  request-log:
    enabled: true
  tool-invocation-log:
    enabled: true

spring:
  application:
    name: trade-mcp
  ai:
    mcp:
      server:
        type: SYNC
        annotation-scanner:
          enabled: true
        # WebMVC transport: defaults to SSE if protocol not specified
        protocol: SSE
        # 与 MCP Python SDK（mcp.client.sse）及 deploy/mcp-e2e/mcp_e2e.py 默认路径一致
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message

downstream:
  backend:
    # Java backend（/api/mcp/*）；与生产/测试机一致：154.89.148.172，API 端口见项目 docker-compose BACKEND_PORT（默认 5002）
    base-url: http://154.89.148.172:5002
  binance-service:
    # 行情/K 线：与 trade/common/config.py 中 BINANCE_SERVICE_LIST 默认实例一致，多地址轮询
    base-urls:
      - http://185.242.232.23:5004
      - http://185.242.232.42:5004
    # 未配置 base-urls 时的单地址回退（一般不用）
    # base-url: http://185.242.232.23:5004

# 运行时覆盖（优先级：BINANCE_SERVICE_LIST > downstream.binance-service.base-urls）
# DOWNSTREAM_BACKEND_BASEURL=http://154.89.148.172:5002
# DOWNSTREAM_BINANCESERVICE_BASEURLS_0=http://185.242.232.23:5004
# DOWNSTREAM_BINANCESERVICE_BASEURLS_1=http://185.242.232.42:5004
# 或与 trade 完全一致：
# BINANCE_SERVICE_LIST=[{"base_url":"http://185.242.232.23:5004","timeout":30},{"base_url":"http://185.242.232.42:5004","timeout":30}]
